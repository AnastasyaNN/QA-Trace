name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    env:
      TAG: ${{ github.event.release.tag_name }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: npm

      - run: npm ci

      - name: Verify tag matches version
        run: |
          VERSION="${TAG#v}"
          PKG=$(node -p "require('./package.json').version")
          MAN=$(node -p "require('./public/manifest.json').version")
          if [ "$VERSION" != "$PKG" ] || [ "$VERSION" != "$MAN" ]; then
            echo "Tag $TAG (=$VERSION) != package.json ($PKG) / manifest.json ($MAN)"
            exit 1
          fi

      - run: npm test

      - run: npm run build

      - name: Package archives
        run: |
          VERSION="${TAG#v}"
          (cd dist && zip -r "../qa-trace-chrome-$VERSION.zip" .)
          (cd dist-firefox && zip -r "../qa-trace-firefox-$VERSION.zip" .)
          git archive --format=zip -o "qa-trace-source-$VERSION.zip" HEAD

      - name: Attach archives to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$TAG" qa-trace-chrome-*.zip qa-trace-firefox-*.zip qa-trace-source-*.zip --clobber
